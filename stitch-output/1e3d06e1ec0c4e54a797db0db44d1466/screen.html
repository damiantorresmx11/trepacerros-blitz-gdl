<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TREPACERROS - Active Mission</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "xs": "4px",

                    "fontFamily": {
                        "headline-md": ["Lexend"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-overlay {
            background: linear-gradient(to bottom, rgba(252, 249, 248, 0.1) 0%, rgba(252, 249, 248, 0.9) 100%);
        }
        .gps-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="bg-[#fdfbf7] dark:bg-stone-950 shadow-sm border-b border-stone-200 dark:border-stone-800 fixed top-0 z-[60] w-full max-w-[480px]">
<div class="flex justify-between items-center w-full px-5 py-3 max-w-[480px] mx-auto">
<div class="flex items-center gap-3">
<button class="hover:bg-stone-100 dark:hover:bg-stone-900 transition-colors active:scale-95 duration-150 p-1 rounded-full">
<span class="material-symbols-outlined text-[#2D5A27] dark:text-emerald-500">menu</span>
</button>
<h1 class="text-xl font-black text-[#2D5A27] dark:text-emerald-400 uppercase font-['Lexend'] tracking-tight">TREPACERROS</h1>
</div>
<div class="bg-secondary-container/30 px-3 py-1 rounded-full border border-outline-variant/30">
<span class="font-label-web3 text-label-web3 text-secondary">0x7...4a2</span>
</div>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative w-full max-w-[480px] h-screen pt-[56px] overflow-hidden">
<!-- Satellite Map Background -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="Realistic satellite view of Bosque de la Primavera Guadalajara, dense pine forest with rugged terrain and visible trail networks" data-location="Guadalajara" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAWW-7DPvyWRvzIpOkE3l1dplZ63WYna89TMHSsDu7xbTNhWhZ6a-SFNogkilG9qxwiRHr2kwOVe6GKcndtclzsFMesu80yrObbMqTd2MF-ytga49tIMIWWQLy5fEhR58cCBRuBfZO_dytBgNNSIxYEaGZV79siTtcGvJUsey7RTdl-EkLzmfA9szyEfQI5nZ24ixwaIjBzsvjtY0oyU8vqOODKRe6jSAQoUypPpABidYcU3uGnn6YinmNLrwNMsehJy1HQHoq1fY"/>
<!-- GPS Path Overlay Simulation -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 480 800">
<path class="gps-path shadow-lg" d="M 240 500 L 220 450 L 250 400 L 280 350 L 230 300 L 200 250" fill="none" stroke="#4ade80" stroke-linecap="round" stroke-width="6" style="filter: drop-shadow(0px 0px 4px rgba(74, 222, 128, 0.8));"></path>
<!-- Current Location Pulse -->
<circle cx="200" cy="250" fill="#4ade80" fill-opacity="0.3" r="12">
<!-- Animation would go here -->
</circle>
<circle cx="200" cy="250" fill="#154212" r="6" stroke="white" stroke-width="2"></circle>
</svg>
</div>
<!-- Live Indicator -->
<div class="absolute top-20 left-5 z-10 flex items-center gap-2 bg-white/90 backdrop-blur-md px-3 py-1.5 rounded-full shadow-lg border border-white/50">
<span class="relative flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-error opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-error"></span>
</span>
<span class="font-cta-text text-[12px] text-on-surface uppercase tracking-widest">Live Mission</span>
</div>
<!-- Dynamic Controls (Side) -->
<div class="absolute right-5 top-20 z-10 flex flex-col gap-3">
<button class="w-12 h-12 bg-white rounded-xl shadow-lg flex items-center justify-center text-primary active:scale-90 transition-transform">
<span class="material-symbols-outlined">layers</span>
</button>
<button class="w-12 h-12 bg-white rounded-xl shadow-lg flex items-center justify-center text-primary active:scale-90 transition-transform">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<!-- Mission Stats Glass Card -->
<div class="absolute bottom-24 left-1/2 -translate-x-1/2 w-[calc(100%-40px)] z-20">
<div class="bg-white/95 backdrop-blur-xl rounded-[2rem] p-6 shadow-2xl border border-white/40 flex flex-col gap-6">
<!-- Stats Row -->
<div class="grid grid-cols-3 gap-2">
<div class="flex flex-col items-center">
<span class="text-stone-500 font-label-web3 text-[10px] uppercase">Distance</span>
<span class="font-display-lg text-[24px] text-primary">2.4 KM</span>
</div>
<div class="flex flex-col items-center border-x border-stone-100">
<span class="text-stone-500 font-label-web3 text-[10px] uppercase">Duration</span>
<span class="font-display-lg text-[24px] text-primary">15:20</span>
</div>
<div class="flex flex-col items-center">
<span class="text-stone-500 font-label-web3 text-[10px] uppercase">Trash</span>
<span class="font-display-lg text-[24px] text-tertiary-container">1.2 KG</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-[#ff6b00] hover:bg-[#e66000] text-white font-cta-text py-5 rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3 uppercase tracking-wider">
<span class="material-symbols-outlined" data-weight="fill">stop_circle</span>
                    END TREPADA
                </button>
</div>
</div>
<!-- Secondary Progress Mini-badge -->
<div class="absolute bottom-72 left-8 z-30">
<div class="bg-primary px-4 py-2 rounded-full flex items-center gap-2 shadow-lg">
<span class="material-symbols-outlined text-on-primary-container text-sm">energy_savings_leaf</span>
<span class="font-label-web3 text-white text-[12px]">+45 ECO POINTS</span>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] z-50 flex justify-around items-center px-4 py-3 pb-6 bg-[#fdfbf7] dark:bg-stone-950 rounded-t-2xl border-t border-stone-200 dark:border-stone-800 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 opacity-70 hover:text-[#ff6b00] active:scale-90 transition-transform">
<span class="material-symbols-outlined">explore</span>
<span class="font-['Lexend'] text-[10px] font-bold uppercase mt-1">MAP</span>
</button>
<button class="flex flex-col items-center justify-center text-[#ff6b00] bg-orange-50 dark:bg-orange-950/30 rounded-xl px-3 py-1 active:scale-90 transition-transform">
<span class="material-symbols-outlined">altitude</span>
<span class="font-['Lexend'] text-[10px] font-bold uppercase mt-1">TREKS</span>
</button>
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 opacity-70 hover:text-[#ff6b00] active:scale-90 transition-transform">
<span class="material-symbols-outlined">recycling</span>
<span class="font-['Lexend'] text-[10px] font-bold uppercase mt-1">IMPACT</span>
</button>
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 opacity-70 hover:text-[#ff6b00] active:scale-90 transition-transform">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-['Lexend'] text-[10px] font-bold uppercase mt-1">WALLET</span>
</button>
</nav>
</body></html>
