<!DOCTYPE html>

<html class="light" lang="en"><head>

<title>Summit Clean | Active Mission</title>

            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .surface_glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gps-glow {
            filter: drop-shadow(0 0 8px #4ade80);
        }
        .map-container {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body-md text-on-background overflow-hidden h-screen w-full">
<!-- Satellite Map Overlay -->
<div class="map-container overflow-hidden">
<img class="w-full h-full object-cover grayscale-[20%] contrast-[110%] brightness-[90%]" data-alt="Satellite view of dense forest terrain with rugged topography and deep green vegetation at Bosque La Primavera" data-location="Bosque La Primavera" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCy6__g0uiVzWphQ7JMe-HyaFl1jn5Hs7Yx5lbAa2jlm1HTVtD6-EfSnE4GmAWraSSWkE2TOUucZzoG6uMmhwQFafcd86ss0KNvYNBu1swdNY94G_czKWOBwrRjTVpVK1xY-6Ccx5OznZ2OfooY3v4go6o3wGgHgz8Mm_pfjkpQ6iILeOKoXKw7qaI8hMHIYQMZ8Hw7ZMuDZfmYtvdLXWs0ZSQ3DuYZ0COJjnM-tPM4UnA21TmRwi78Ytbn6wdWAbWSc2c5a85q64M"/>
<!-- GPS Path (SVG Overlay) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="xMidYMid slice" viewbox="0 0 1000 1000">
<path class="gps-glow opacity-80" d="M100,800 Q250,750 300,600 T500,450 T650,300 T800,100" fill="none" stroke="#4ade80" stroke-linecap="round" stroke-width="8"></path>
<circle class="gps-glow" cx="800" cy="100" fill="#4ade80" r="10"></circle>
<circle class="animate-pulse" cx="800" cy="100" fill="none" r="20" stroke="#4ade80" stroke-width="2"></circle>
</svg>
</div>
<!-- Top Navigation Anchor (Shared Component Pattern) -->
<header class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex justify-between items-center bg-stone-50/80 dark:bg-stone-900/80 backdrop-blur-md border-b border-white/20">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
<img class="w-full h-full object-cover" data-alt="User avatar wearing technical outdoor gear and a sleek tracking visor" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDheEynF--M450TrS-VG6XBfGOln64496Zr9Fcf-l3ZsbkN-dHvS2vlXlj96TsVWF3iAof07RhgMTwnwFX1uuB0k4o6hACOnpyReITXj2q71e74A4rBgsRj5qfkIPC4aQJgoX4oADK5pkCC66b03PGZDJvrIuBd6Rn9x-OEl4x_gx-5JD4Sry_5iW4Z3NSL2mtIN6ldTgDL6UOFsvXgv4Uyp1NPX8VFaeNuUe8EqHayFlOkUOZcDoPZCz16fnIphbN5e7kybT4sblY"/>
</div>
<div class="flex flex-col">
<span class="font-headline-lg text-[18px] leading-tight text-green-900 tracking-tighter">Summit Clean</span>
<span class="font-caption text-[10px] uppercase tracking-widest text-orange-600 font-bold">Mission Active</span>
</div>
</div>
<div class="flex gap-2">
<div class="flex items-center gap-2 bg-white/50 backdrop-blur-sm px-3 py-1.5 rounded-full border border-white/40">
<span class="material-symbols-outlined text-[18px] text-orange-600" data-icon="satellite_alt">satellite_alt</span>
<span class="font-label-bold text-on-surface">GPS Locked</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 h-full flex flex-col justify-end pb-[120px] px-margin-safe">
<!-- Metrics Bento Board -->
<div class="surface_glass rounded-[2rem] p-md shadow-[0_20px_40px_rgba(45,90,39,0.15)] flex flex-col gap-md max-w-xl mx-auto w-full border border-white/30">
<div class="grid grid-cols-2 gap-sm">
<!-- Duration -->
<div class="bg-primary/5 rounded-[1.5rem] p-sm flex flex-col gap-1 border border-primary/10">
<span class="font-caption text-primary/60 uppercase tracking-widest">Duration</span>
<div class="flex items-baseline gap-1">
<span class="font-headline-lg text-primary text-[28px]">01:42</span>
<span class="font-caption text-primary/60">hrs</span>
</div>
</div>
<!-- Distance -->
<div class="bg-primary/5 rounded-[1.5rem] p-sm flex flex-col gap-1 border border-primary/10">
<span class="font-caption text-primary/60 uppercase tracking-widest">KM Covered</span>
<div class="flex items-baseline gap-1">
<span class="font-headline-lg text-primary text-[28px]">4.82</span>
<span class="font-caption text-primary/60">km</span>
</div>
</div>
</div>
<!-- AI Unit Counter (Primary Action Focused) -->
<div class="bg-surface-container-lowest rounded-[1.5rem] p-md flex items-center justify-between border border-primary-container/10">
<div class="flex flex-col">
<span class="font-caption text-orange-600 font-bold uppercase tracking-widest">Units Collected</span>
<span class="font-display-lg text-green-900 leading-none">24</span>
<span class="font-caption text-on-surface-variant italic mt-1">AI verified path debris</span>
</div>
<div class="w-16 h-16 rounded-2xl bg-orange-50 flex items-center justify-center border border-orange-200">
<span class="material-symbols-outlined text-orange-600 text-[32px]" data-icon="cleaning_services">cleaning_services</span>
</div>
</div>
<!-- Action Area -->
<div class="flex flex-col gap-sm">
<button class="w-full bg-[#ff5a00] hover:bg-orange-700 active:scale-95 transition-all text-white font-headline-md py-4 rounded-full flex items-center justify-center gap-3 border-t border-white/20 shadow-lg group">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform" data-icon="stop_circle">stop_circle</span>
                    END MISSION
                </button>
<div class="flex justify-center items-center gap-4 py-2">
<button class="p-3 bg-white/40 rounded-full border border-white/60 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface" data-icon="photo_camera">photo_camera</span>
</button>
<button class="p-3 bg-white/40 rounded-full border border-white/60 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface" data-icon="location_on">location_on</span>
</button>
<button class="p-3 bg-white/40 rounded-full border border-white/60 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface" data-icon="share">share</span>
</button>
</div>
</div>
</div>
</main>
<!-- Navigation suppressed per Destination Rule - Transactional/Task-Focused state -->
<!-- Bottom Notification Toast (Subtle) -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] flex items-center gap-3 bg-inverse-surface text-inverse-on-surface px-4 py-2.5 rounded-full shadow-xl">
<div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
<span class="font-caption font-bold tracking-wide">RECORDING ACTIVE</span>
</div>
</body></html>
